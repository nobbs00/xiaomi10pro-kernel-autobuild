name: 编译KSUN——SUS内核
run-name: ${{ github.actor }} 正在编译 骁龙865 小米系列内核！🚀 🚀
on:
  workflow_dispatch:
    inputs:
      phone:
        description: '选择手机型号：'
        required: true
        default: '小米10pro'
        type: choice
        options:
          - 小米10pro

jobs:
  build_job:
    runs-on: ubuntu-latest
    steps:
      - name: 设置编译环境
        run: |
          mkdir -p $GITHUB_WORKSPACE/kernel_workspace
          cd $GITHUB_WORKSPACE/kernel_workspace
          wget -q https://github.com/ZyCromerZ/Clang/releases/download/20.0.0git-20250129-release/Clang-20.0.0git-20250129.tar.gz
          mkdir -p 2025
          tar -xzf Clang-20.0.0git-20250129.tar.gz -C 2025

      - name: Initialize repo and sync
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          git clone -b test https://github.com/nobbs00/kernel_xiaomi_sm8250_mod.git --depth=1 android_kernel
          if [ ! -d "android_kernel" ]; then
            echo "Error: android_kernel directory not found!"
            exit 1
          fi
          git clone -b test https://github.com/nobbs00/xiaomi10pro-kernel-autobuild.git src

      - name: Set up KernelSU Next
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android_kernel
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/refs/heads/next-susfs/kernel/setup.sh" | bash -s
          cd KernelSU-Next
          KSU_VERSION=$(expr $(/usr/bin/git rev-list --count HEAD) "+" 10200)
          echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
          sed -i "s/DKSU_VERSION=11998/DKSU_VERSION=${KSU_VERSION}/" kernel/Makefile

      - name: Set up susfs
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b kernel-4.19
          git clone https://github.com/TheWildJames/kernel_patches.git
          cd android_kernel
          cp ../kernel_patches/next/0001-kernel-patch-susfs-v1.5.5-to-KernelSU-Next-v1.0.5.patch ./KernelSU-Next/
          cp ../susfs4ksu/kernel_patches/50_add_susfs_in_kernel-4.19.patch .
          cp -r ../susfs4ksu/kernel_patches/fs/* ./fs/
          cp -r ../susfs4ksu/kernel_patches/include/linux/* ./include/linux/

          # Apply patches
          # cd ./KernelSU-Next
          # patch -p1 < 0001-kernel-patch-susfs-v1.5.5-to-KernelSU-Next-v1.0.5.patch || true
          # cd ../
          # patch -p1 < 50_add_susfs_in_kernel-4.19.patch || true

          # cp ../kernel_patches/next/next_hooks.patch ./
          # patch -p1 -F 3 < next_hooks.patch

          # Apply VFS fix changes directly

      - name: Setup environment
        run: |
        # 显示调试信息
        echo "Workspace: $GITHUB_WORKSPACE"
         cd $GITHUB_WORKSPACE/kernel_workspace/android_kernel
        echo "Current directory: $(pwd)"
         ls -l kernel/

      - name: Apply VFS fix to ksud.c
        run: |
         cd $GITHUB_WORKSPACE/kernel_workspace/android_kernel
         sed -i '/#include "selinux\/selinux.h"/a \
         bool ksu_vfs_read_hook = true;\
         bool ksu_execveat_hook = true;\
         bool ksu_input_hook = true;\
         EXPORT_SYMBOL(ksu_vfs_read_hook);\
         EXPORT_SYMBOL(ksu_execveat_hook);\
         EXPORT_SYMBOL(ksu_input_hook);' kernel/ksud.c

      - name: Apply VFS fix to ksud.h
        run: |
         cd $GITHUB_WORKSPACE/kernel_workspace/android_kernel
         sed -i '/#include <linux\/types.h>/a \
         extern bool ksu_vfs_read_hook;\
         extern bool ksu_execveat_hook;\
         extern bool ksu_input_hook;' kernel/ksud.h

      - name: Verify changes
        run: |
         cd $GITHUB_WORKSPACE/kernel_workspace/android_kernel
         echo "=== ksud.c changes ==="
         grep -A5 'selinux/selinux.h' kernel/ksud.c
         echo "=== ksud.h changes ==="
         grep -A3 'linux/types.h' kernel/ksud.h

      - name: Apply new hook and add configuration
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android_kernel
          echo "CONFIG_KSU=y" >> ./arch/arm64/configs/cmi_defconfig
          echo "CONFIG_KSU_WITH_KPROBES=n" >> ./arch/arm64/configs/cmi_defconfig
          echo "CONFIG_KSU_SUSFS=y" >> ./arch/arm64/configs/cmi_defconfig
          echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> ./arch/arm64/configs/cmi_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> ./arch/arm64/configs/cmi_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> ./arch/arm64/configs/cmi_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> ./arch/arm64/configs/cmi_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> ./arch/arm64/configs/cmi_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> ./arch/arm64/configs/cmi_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n" >> ./arch/arm64/configs/cmi_defconfig
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> ./arch/arm64/configs/cmi_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> ./arch/arm64/configs/cmi_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> ./arch/arm64/configs/cmi_defconfig
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> ./arch/arm64/configs/cmi_defconfig
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> ./arch/arm64/configs/cmi_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> ./arch/arm64/configs/cmi_defconfig
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> ./arch/arm64/configs/cmi_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_SU=n" >> ./arch/arm64/configs/cmi_defconfig

      - name: 开始编译
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android_kernel
          bash build.sh cmi

      - name: 上传刷入包
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_MIUI_cmi
          path: kernel_workspace/android_kernel/anykernel/*
          retention-days: 3
